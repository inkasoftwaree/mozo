<div class="flex items-center justify-between mt-4 flex-wrap gap-2">

  <p class="text-xs text-base-content/50">
    Página <span class="font-semibold text-base-content">{{ page() }}</span> de
    <span class="font-semibold text-base-content">{{ totalPages() }}</span>
  </p>

  <div class="join">
    <button class="join-item btn btn-sm btn-ghost" (click)="prev()" [disabled]="page() === 1" aria-label="Anterior">
      «
    </button>

    @for (p of pages(); track p) {
      <button
        class="join-item btn btn-sm"
        [class.btn-primary]="p === page()"
        [class.btn-ghost]="p !== page()"
        (click)="goTo(p)">
        {{ p }}
      </button>
    }

    <button class="join-item btn btn-sm btn-ghost" (click)="next()" [disabled]="page() === totalPages()" aria-label="Siguiente">
      »
    </button>
  </div>

</div>

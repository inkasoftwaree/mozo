<div class="join mt-4">

  <button class="join-item btn" (click)="prev()" [disabled]="page() === 1">
    «
  </button>

  @for (p of pages(); track p) {
  <button
    class="join-item btn"
    [class.btn-active]="p === page()"
    (click)="goTo(p)">
    {{ p }}
  </button>
  }

  <button class="join-item btn" (click)="next()" [disabled]="page() === totalPages()">
    »
  </button>

</div>

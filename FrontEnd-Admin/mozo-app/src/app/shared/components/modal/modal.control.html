@if (isOpen()) {
  <dialog
    class="modal modal-open"
    role="dialog"
    [attr.aria-modal]="true"
    (click)="onBackdropClick()">

    <!-- Caja del modal — stopPropagation para no cerrar al hacer clic adentro -->
    <div
      [class]="'modal-box w-11/12 sm:w-full ' + modalWidthClass() + ' max-h-[90dvh] flex flex-col p-0'"
      (click)="$event.stopPropagation()">

      <!-- Header fijo -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-base-200 flex-shrink-0">
        <h2 class="text-lg font-bold leading-tight">{{ title$() }}</h2>
        <button
          type="button"
          (click)="close()"
          class="btn btn-sm btn-circle btn-ghost"
          aria-label="Cerrar modal">✕</button>
      </div>

      <!-- Contenido con scroll -->
      <div class="overflow-y-auto flex-1 px-5 py-4">
        <ng-content />
      </div>

    </div>
  </dialog>
}

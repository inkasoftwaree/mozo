<form [formGroup]="form" (ngSubmit)="save()">
  <div class="grid grid-cols-12 gap-4">

    <mz-form-field-control label="Orden" [colSpan]="2" [errorMessage]="getError('nuOrden') ? 'El orden es obligatorio.' : null">
      <input #firstInput type="number" required maxlength="2" placeholder="Orden" class="input w-full validator" formControlName="nuOrden" id="nuOrden" />
    </mz-form-field-control>

    <mz-form-field-control label="Nombre" [colSpan]="5"
      [errorMessage]="getError('noTipo') ? 'El Nombre es obligatorio.' : null">
      <input type="text" maxlength="30" required placeholder="Nombre" class="input w-full validator" formControlName="noTipo" />
    </mz-form-field-control>

    <mz-form-field-control label="Sigla" [colSpan]="5">
      <input type="text" maxlength="5" placeholder="Sigla" class="input w-full" formControlName="noSigla" />
    </mz-form-field-control>

    <mz-form-field-control label="Descripción">
      <textarea class="textarea w-full h-34" maxlength="1000" placeholder="Descripción" formControlName="txDescripcion"></textarea>
    </mz-form-field-control>

    <div>
      <label class="label cursor-pointer justify-start gap-3">
        <span class="label-text">Por defecto</span>
        <input type="checkbox" class="toggle toggle-primary" formControlName="flDefault">
      </label>
    </div>
  </div>


  <div class="modal-action">
      <mz-button-control
        [view]="MenuControlTypeEnum.Cancel"
        (click)="modalService.close()"
      />
      <mz-button-control
        type="submit"
        shortcut="ctrl+s"
        [view]="MenuControlTypeEnum.Save"
      />
  </div>

</form>

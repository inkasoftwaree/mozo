<div class="page-header">
  <h1 class="page-title">Mantenimiento de Tipos</h1>
  <mz-button-control type="submit" [view]="MenuControlTypeEnum.New" (click)="onMenuAction('insert', null)" />
</div>

<div class="content-card mb-4">
  <div class="grid grid-cols-12 gap-4">

    <mz-form-field-control [colSpan]="6" label="Módulo">
      <select class="select select-bordered w-full" [ngModel]="selectedModulo()"
        (ngModelChange)="onModuloChange($event)">
        <option [ngValue]="null" disabled selected>{{ MSG_FIELD_FORM.COMBO_REQUIRED }}</option>
        @for (item of modulos(); track item.coModulo) {
        <option [ngValue]="item.coModulo">{{ item.noModulo }}</option>
        }
      </select>
    </mz-form-field-control>

    <mz-form-field-control [colSpan]="6" label="Grupo">
      <select class="select select-bordered w-full" [ngModel]="selectedGrupo()" (ngModelChange)="onGrupoChange($event)"
        [disabled]="selectedModulo() === null || isLoadingGrupos()">
        <option [ngValue]="null" disabled selected>{{ MSG_FIELD_FORM.COMBO_REQUIRED }}</option>
        @for (item of grupos(); track item.coGrupo ?? item.coTipo) {
        <option [ngValue]="item.coGrupo ?? item.coTipo">{{ item.noTipo }}</option>
        }
      </select>
    </mz-form-field-control>
  </div>
</div>

<div class="content-card">
  <mz-generic-grid [items]="tipoParticulares()" [loading]="isLoadingGrid()" [skeletonCount]="6" [columnas]="2"
    [espaciado]="4" [bordeGrosor]="1" bordeColor="border-base-200" redondeado="xl" [sombra]="true" [hover]="true"
    [emptyMessage]="gridEmptyMessage()" bgColor="bg-base-100">

    <ng-template #itemTemplate let-tipo>

      <div class="flex items-center gap-2 px-2 py-2">
        @if (tipo.nuOrden != null) {
        <span class="badge badge-ghost badge font-mono shrink-0">
          {{ tipo.nuOrden }}
        </span>
        }
        <mz-state-control class="shrink-0" [state]="tipo.flEstReg == 1 ? 1 : 0" />
        @if (tipo.flDefault === 1) {
        <span class="badge badge-primary badge shrink-0">D</span>
        }
        <span class="flex-1 min-w-0 truncate font-semibold">
          {{ tipo.noTipo }}

          @if (tipo.noSigla) {         
            - {{ tipo.noSigla }}         
          }
          @if ((tipo.coGrupoHijo ?? 0) > 0) {
            => {{ tipo.qtHijo ?? 0 }}
          }
          
        </span>


        <mz-menu-control class="shrink-0" [items]="menuItems" [state]="tipo.flEstReg ?? null"
          (action)="onMenuAction($event, tipo)" />
      </div>


    </ng-template>
  </mz-generic-grid>
</div>

@if (showPagination()) {
<mz-pagination-control [page]="pageIndex()" [totalPages]="pageCount" (change)="goToPage($event)" />
}

<mz-modal-control name="tipo-particular-form-page" #tipoParticularModal>
  <mz-tipo-particular-form-page (saved)="onSaved($event)" [data]="tipoParticularModal.data$()" />
</mz-modal-control>

<div class="page-header">
  <h1 class="page-title">Mantenimiento de Empresas</h1>
  <mz-button-control type="submit" [view]="MenuControlTypeEnum.New" (click)="onMenuAction('insert', null)" />
</div>

<div class="content-card">
  <mz-generic-grid [items]="empresas()" [loading]="isLoadingGrid()" [skeletonCount]="6" [columnas]="2" [espaciado]="4"
    [bordeGrosor]="1" bordeColor="border-base-200" redondeado="xl" [sombra]="true" [hover]="true"
    emptyMessage="No hay empresas registradas" bgColor="bg-base-100">

    <ng-template #itemTemplate let-empresa>

      <!-- Header: badge + estado + nombre + menú -->
      <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12">
          <div class="flex items-center gap-2 px-3 py-1">

            <mz-state-control class="shrink-0" [state]="empresa.flEstReg == 1 ? 1 : 0" />
            <span class="flex-1 min-w-0 truncate font-semibold">
              {{ empresa.noEmpresa }}
            </span>
            <pre class="font-code"><code>#{{ empresa.coEmpresa }}</code></pre>
            <mz-menu-control class="shrink-0" [items]="menuItems" [state]="empresa.flEstReg ?? null"
              (action)="onMenuAction($event, empresa)" />

          </div>
        </div>
        <div class="col-span-12 mx-5 mb-1 ">
          <!-- Nombre corto -->
          @if (empresa.noEmpresaCorto) {
          <p class="text-base-content/60 mb-1 truncate">
            {{ empresa.noEmpresaCorto }}
          </p>
          }

          <!-- Separador -->
          <div class="border-t border-base-200 mt-auto pt-2">
            <div class="flex items-start justify-between gap-2">
              <span class="text-base-content/70 leading-tight">
                {{ getModulosTexto(empresa.coEmpresa!) }}
              </span>
            </div>
          </div>

        </div>
      </div>


    </ng-template>
  </mz-generic-grid>
</div>

<mz-pagination-control [page]="pageIndex()" [totalPages]="pageCount" (change)="goToPage($event)" />

<mz-modal-control name="empresa-form-page" #empresaModal>
  <mz-empresa-form-page (saved)="onSaved(empresaModal.data$())" [data]="empresaModal.data$()" />
</mz-modal-control>

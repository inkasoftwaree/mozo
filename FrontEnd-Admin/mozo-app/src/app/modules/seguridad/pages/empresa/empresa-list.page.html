<div class="page-header">
  <h1 class="page-title">Mantenimiento de Empresas</h1>
  <mz-button-control type="submit" [view]="MenuControlTypeEnum.New" (click)="onMenuAction('insert', null)" />
</div>

<div class="content-card">
  <mz-generic-grid
      [items]="empresas()"
      [loading]="isLoadingGrid()"
      [skeletonCount]="6"
      [columnas]="3"
      [espaciado]="4"
      [bordeGrosor]="1"
      bordeColor="border-base-200"
      redondeado="xl"
      [sombra]="true"
      [hover]="true"
      emptyMessage="No hay empresas registradas"
      bgColor="bg-base-100">

    <ng-template #itemTemplate let-empresa>
      <div class="p-3 sm:p-4 flex flex-col h-full">

        <!-- Header: badge + estado + nombre + menú -->
        <div class="flex items-start justify-between gap-2 mb-3">
          <div class="flex items-center gap-1.5 flex-wrap min-w-0">
            <span class="badge badge-ghost font-mono text-xs shrink-0">
              #{{ empresa.coEmpresa }}
            </span>
            <mz-state-control [state]="empresa.flEstReg == 1 ? 1 : 0" />
            <span class="text-sm font-bold text-base-content leading-tight truncate">
              {{ empresa.noEmpresa }}
            </span>
          </div>
          <mz-menu-control
            class="shrink-0"
            [items]="menuItems"
            [state]="empresa.flEstReg ?? null"
            (action)="onMenuAction($event, empresa)" />
        </div>

        <!-- Nombre corto -->
        @if (empresa.noEmpresaCorto) {
          <p class="text-xs text-base-content/60 mb-3 truncate">
            {{ empresa.noEmpresaCorto }}
          </p>
        }

        <!-- Separador -->
        <div class="border-t border-base-200 mt-auto pt-2">
          <div class="flex items-start justify-between gap-2">
            <span class="text-xs text-base-content/40 font-semibold uppercase tracking-wide shrink-0 pt-0.5">
              Módulos
            </span>
            <span class="text-xs text-base-content/70 text-right leading-tight">
              {{ getModulosTexto(empresa.coEmpresa!) }}
            </span>
          </div>
        </div>

      </div>
    </ng-template>
  </mz-generic-grid>
</div>

<mz-pagination-control [page]="pageIndex()" [totalPages]="pageCount" (change)="goToPage($event)" />

<mz-modal-control name="empresa-form-page" #empresaModal>
  <mz-empresa-form-page (saved)="onSaved(empresaModal.data$())" [data]="empresaModal.data$()" />
</mz-modal-control>

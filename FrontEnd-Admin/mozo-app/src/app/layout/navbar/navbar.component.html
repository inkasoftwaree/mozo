<nav class="navbar app-navbar bg-base-100 px-2 sm:px-4 min-h-14">

  <!-- IZQUIERDA: hamburger (solo mobile) -->
  <div class="flex items-center gap-2">
    <label
      for="my-drawer-4"
      aria-label="Abrir menú lateral"
      class="btn btn-sm btn-square btn-ghost lg:hidden">
      <ng-icon name="lucidePanelRightOpen" class="text-xl text-primary" />
    </label>
  </div>

  <!-- MODAL DE LOGIN -->
  <mz-modal-control name="login-page" #loginModal>
    <mz-login-page [data]="loginModal.data$()" />
  </mz-modal-control>

  <!-- DERECHA: usuario -->
  <div class="flex items-center gap-1 ml-auto flex-shrink-0">
    @if (user(); as u) {
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-2 px-2">
          <div class="avatar-initials">{{ u.noUsuario.charAt(0) }}</div>
          <span class="hidden sm:block text-sm font-medium max-w-28 truncate">{{ u.noUsuario }}</span>
          <ng-icon name="lucideMoreVertical" class="text-base opacity-50" />
        </div>
        <ul
          tabindex="0"
          class="dropdown-content menu bg-base-100 border border-base-200 rounded-box
                 w-48 p-1.5 shadow-lg mt-1 z-50">
          <li class="menu-title px-3 py-1">
            <span class="text-xs opacity-50 truncate">{{ u.noUsuario }}</span>
          </li>
          <li>
            <a (click)="logout()" class="text-error gap-2">
              <ng-icon name="lucideLogOut" class="text-base" />
              Cerrar sesión
            </a>
          </li>
        </ul>
      </div>
    } @else {
      <button (click)="openLogin()" class="btn btn-primary btn-sm gap-1.5">
        <ng-icon name="lucideUser" class="text-base" />
        <span class="hidden sm:block">Iniciar sesión</span>
      </button>
    }
  </div>

</nav>

<!-- Contenido de la página -->
<div class="p-3 sm:p-5 min-h-[calc(100vh-3.5rem)]">
  <router-outlet />
</div>

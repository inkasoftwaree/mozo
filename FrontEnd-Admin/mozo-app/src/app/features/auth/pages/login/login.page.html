
@if(step() === 'login'){

<form [formGroup]="form" (ngSubmit)="onSave()" autocomplete="on">
  <div class="grid gap-4">
    <div>
      <label for="noUsuarioInput" class="floating-label">
        <span class="label-text">Usuario o correo</span>
        <input #noUsuarioInput
          id="noUsuario"
          type="text"
          formControlName="noUsuario"
          class="input validator"
          minlength="3"
          maxlength="80"
          required
          autocomplete="username"
          [attr.aria-invalid]="!!getError('noUsuario')"
          placeholder="Usuario o correo" />
      </label>
      @if (getError('noUsuario')) {
        <p class="text-red-500 text-sm mt-1" aria-live="polite">
          Usuario inválido
        </p>
      }
    </div>

    <div>
      <label for="noClaveInput" class="floating-label">
        <span class="label-text">Clave</span>
        <input
          id="noClaveInput"
          type="password"
          class="input validator"
          placeholder="Clave"
          formControlName="noClave"
          minlength="4"
          maxlength="50"
          required
          autocomplete="current-password"
          [attr.aria-invalid]="!!getError('noClave')" />
      </label>
      @if (getError('noClave')) {
        <p class="text-red-500 text-sm mt-1" aria-live="polite">
          Clave inválida
        </p>
      }
    </div>

    <div class="modal-action flex items-center justify-end gap-2 mt-6">
      <button type="button" class="btn btn-ghost btn-sm" (click)="modalService.close()">
        Cancelar
      </button>
      <button type="submit" class="btn btn-primary btn-sm gap-1.5" [disabled]="form.invalid">
        <ng-icon name="lucideLogOut" class="text-base rotate-180" />
        Ingresar
      </button>
    </div>
  </div>
</form>
}
@else{

<div role="alert" class="alert alert-info alert-soft mb-2">
  <span>Seleccionar Empresa</span>
</div>
 
  


    <div class="space-y-2">

        @for(empresa of empresas(); track empresa.coEmpresa){

            <button
                class="btn btn-outline w-full"
                (click)="seleccionarEmpresa(empresa.coEmpresa??0)">

                {{empresa.noEmpresa}}

            </button>

        }

    </div>

}
